name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Type Check
        run: npm run check

      - name: Prepare Wrangler config
        run: |
          test -n "$DEDUPE_KV_NAMESPACE_ID"
          node -e "const fs=require('fs'); const p='wrangler.toml'; fs.writeFileSync(p, fs.readFileSync(p, 'utf8').replace('ADD_KV_NAMESPACE_ID', process.env.DEDUPE_KV_NAMESPACE_ID));"
        env:
          DEDUPE_KV_NAMESPACE_ID: ${{ secrets.DEDUPE_KV_NAMESPACE_ID }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
